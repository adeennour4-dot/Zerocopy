name: Build ZeroCopy v8

on:
  push:
    branches: [ "main", "master", "develop" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      enable_rust:
        description: 'Build Rust optimization layer'
        required: false
        default: false
        type: boolean

env:
  NDK_VERSION: 27.0.12077973
  CMAKE_VERSION: 3.22.1
  ANDROID_API: 36
  GRADLE_VERSION: 9.3.1

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Install Android SDK components
        id: install-sdk
        run: |
          ANDROID_HOME="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          if [ -z "$ANDROID_HOME" ]; then
            echo "Android SDK not found, installing..."
            mkdir -p $HOME/android-sdk
            cd $HOME/android-sdk
            curl -o cmdline-tools.zip \
              https://dl.google.com/android/repository/commandlinetools-linux-12266719_latest.zip
            unzip -q cmdline-tools.zip
            mkdir -p cmdline-tools/latest
            mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
            ANDROID_HOME=$HOME/android-sdk
            echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
            echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          fi

          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install \
            "platforms;android-${{ env.ANDROID_API }}" \
            "build-tools;${{ env.ANDROID_API }}.0.0" \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;${{ env.CMAKE_VERSION }}" \
            "platform-tools" \
            2>&1 | tail -20

          NDK_HOME="$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}"
          echo "NDK_HOME=$NDK_HOME" >> $GITHUB_ENV
          echo "ndk-path=$NDK_HOME" >> $GITHUB_OUTPUT

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle/
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache CMake builds
        uses: actions/cache@v4
        with:
          path: |
            app/build/intermediates/cxx/
            app/.cxx/
          key: ${{ runner.os }}-cmake-${{ hashFiles('app/src/main/cpp/**', 'app/build.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-cmake-

      - name: Cache LLVM/Clang (NDK)
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.install-sdk.outputs.ndk-path }}/toolchains/llvm
          key: ${{ runner.os }}-ndk-${{ env.NDK_VERSION }}
          restore-keys: |
            ${{ runner.os }}-ndk-

      # -----------------------------------------------------------------------
      # Optional: Build Rust optimization layer
      # -----------------------------------------------------------------------
      - name: Build Rust core
        if: ${{ github.event.inputs.enable_rust == 'true' || github.ref_type == 'tag' }}
        run: |
          export ANDROID_NDK_HOME="${{ env.NDK_HOME }}"
          
          # Install Rust
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          
          # Add Android target
          rustup target add aarch64-linux-android
          
          # Install cargo-ndk
          cargo install cargo-ndk
          
          # Build
          cd rust_core
          export ANDROID_NDK_HOME="${{ env.NDK_HOME }}"
          cargo ndk -t arm64-v8a -o ../app/src/main/jniLibs build --release
          cd ..
          echo "Rust core built and placed in jniLibs"

      - name: Verify Vulkan headers (NDK)
        run: |
          NDK="${{ env.NDK_HOME }}"
          VK_HEADER="$NDK/sources/third_party/vulkan/include/vulkan/vulkan.h"
          if [ -f "$VK_HEADER" ]; then
            echo "Vulkan headers found at $VK_HEADER"
          else
            echo "::warning::Vulkan header not found at $VK_HEADER — Vulkan GPU offload disabled"
          fi

      # -----------------------------------------------------------------------
      # Build APK
      # -----------------------------------------------------------------------
      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        if: ${{ github.event.inputs.build_type != 'release' && github.ref_type != 'tag' }}
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace

      - name: Build release APK
        if: ${{ github.event.inputs.build_type == 'release' || github.ref_type == 'tag' }}
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > keystore.jks
            echo "storePassword=$KEYSTORE_PASSWORD" >> keystore.properties
            echo "keyPassword=$KEY_PASSWORD" >> keystore.properties
            echo "keyAlias=$KEY_ALIAS" >> keystore.properties
            echo "storeFile=../keystore.jks" >> keystore.properties
          fi
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace

      # -----------------------------------------------------------------------
      # Upload artifacts
      # -----------------------------------------------------------------------
      - name: Upload debug APK
        if: ${{ github.event.inputs.build_type != 'release' && github.ref_type != 'tag' }}
        uses: actions/upload-artifact@v4
        with:
          name: ZeroCopy-v8-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload release APK
        if: ${{ github.event.inputs.build_type == 'release' || github.ref_type == 'tag' }}
        uses: actions/upload-artifact@v4
        with:
          name: ZeroCopy-v8-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Upload native debug symbols
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-symbols
          path: app/build/intermediates/merged_native_libs/**/out/lib/
          retention-days: 7

      # -----------------------------------------------------------------------
      # GitHub Release (on tags)
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        if: ${{ github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Separate job: Code quality checks (parallel with build)
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      
      - name: Run ktlint check
        run: |
          # Install ktlint
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.3.1/ktlint
          chmod +x ktlint
          find . -name "*.kt" -path "*/main/*" -exec ./ktlint {} \+
      
      - name: Check for TODOs and FIXMEs
        run: |
          if grep -rn "TODO\|FIXME\|HACK" --include="*.kt" --include="*.cpp" --include="*.rs" .; then
            echo "WARNING: Found TODOs/FIXMEs in code"
          fi

  # ---------------------------------------------------------------------------
  # Separate job: APK size report
  # ---------------------------------------------------------------------------
  size-report:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: ZeroCopy-v8-debug
      
      - name: Analyze APK size
        run: |
          for apk in *.apk; do
            size=$(stat -f%z "$apk" 2>/dev/null || stat -c%s "$apk")
            echo "::notice::$apk: $(( size / 1024 / 1024 )) MB ($(( size / 1024 )) KB)"
          done
